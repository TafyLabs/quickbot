# Nav2 parameter skeleton for the Create 2 base.
# Conservative limits per master plan §10.2 — tune upward only after repeatable goals.

amcl:
  ros__parameters:
    use_sim_time: false
    base_frame_id: base_link
    odom_frame_id: odom
    global_frame_id: map
    scan_topic: scan

controller_server:
  ros__parameters:
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    max_velocity: [0.22, 0.0, 0.8]
    min_velocity: [-0.08, 0.0, -0.8]
    max_accel: [0.25, 0.0, 0.8]
    max_decel: [-0.25, 0.0, -0.8]

local_costmap:
  local_costmap:
    ros__parameters:
      global_frame: odom
      robot_base_frame: base_link
      robot_radius: 0.18
      observation_sources: scan
      scan:
        topic: /scan
        data_type: LaserScan
        marking: true
        clearing: true

global_costmap:
  global_costmap:
    ros__parameters:
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.18
      observation_sources: scan
      scan:
        topic: /scan
        data_type: LaserScan
        marking: true
        clearing: true
