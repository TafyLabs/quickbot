name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  hadolint:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/kilted-base.Dockerfile
          ignore: DL3008,DL3009,DL3015
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/robot.Dockerfile
          ignore: DL3008,DL3009,DL3015
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/rmf-kilted.Dockerfile
          ignore: DL3008,DL3009,DL3015

  yamllint:
    name: Lint YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pipx install yamllint
      - run: yamllint -d "{extends: default, rules: {line-length: disable, document-start: disable, truthy: disable}}" compose.yaml config/

  python:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check ws/src
