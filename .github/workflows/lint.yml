name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint Dockerfiles + YAML + Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: |
          curl -sSL -o /usr/local/bin/hadolint \
            "https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64"
          chmod +x /usr/local/bin/hadolint
          pip install --upgrade pip
          pip install ruff yamllint pytest

      - name: hadolint Dockerfiles
        run: |
          set -e
          for f in docker/*.Dockerfile; do
            echo "::group::$f"
            hadolint \
              --ignore DL3008 --ignore DL3009 --ignore DL3015 \
              --ignore DL4006 --ignore SC2086 \
              "$f"
            echo "::endgroup::"
          done

      - name: yamllint compose + config
        run: |
          yamllint -d "{extends: default, rules: {line-length: disable, document-start: disable, truthy: disable, indentation: {indent-sequences: consistent}}}" \
            compose.yaml config/

      - name: ruff Python
        run: ruff check ws/src

      - name: pytest (pure unit tests; no ROS / no hardware)
        run: |
          PYTHONPATH=ws/src/create2_driver pytest -q ws/src/create2_driver/test
